version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: conflictscope-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: conflictscope_dev
      POSTGRES_DB: conflictscope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ConflictScope Backend (Bun + Elysia) ───────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conflictscope-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:conflictscope_dev@postgres:5432/conflictscope
      PORT: "3001"
      NODE_ENV: development
      FEED_CHECK_INTERVAL: "600000"
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ── ConflictScope Frontend (Next.js) ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked in at build time by Next.js.
        # Override for cloud: NEXT_PUBLIC_API_URL=https://your-api.onrender.com
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: conflictscope-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
